syntax = "proto3";

option java_package = "kr.co.hconnect.samsung_server_sdk.proto";
option java_multiple_files = true;

enum SensorType {
  ACC = 0;
  ECG = 1;
  PPG_GREEN_25 = 2;
  PPG_GREEN_100 = 3;
  UNKNOWN = 4;
}

enum TrackingState {
  IDLE   = 0;
  START  = 1;
  FINISH = 2;
  NONE = 3;
}

message Acc25 {
  int64 timestamp = 1;
  sint32 x = 2;
  sint32 y = 3;
  sint32 z = 4;
}

message PpgGreen25 {
  int64 timestamp = 1;
  int32 green25 = 2;
  int32 ir25 = 3;
  int32 red25 = 4;
}

message PpgGreen100 {
  int64 timestamp = 1;
  int32 green100 = 2;
  int32 ir100 = 3;
  int32 red100 = 4;
}

message Ecg {
  int64 timestamp = 1;
  float value = 2;
  sint32 lead_off = 3;
  float max_threshold_mv = 4;
  float min_threshold_mv = 5;
  uint32 seq = 6;
}

message SensorSamples {
  SensorType sensor_type = 1;

  oneof sensor_data {
    Acc25 acc25_data = 10;
    PpgGreen25 ppg_green_25_data = 11;
    PpgGreen100 ppg_green_100_data = 12;
    Ecg ecg_data = 13;
  }
}

message Metadata {
  TrackingState tracking_state = 1;
  optional int32 period_start_minute = 2;
  optional int64 on_demand_start_timestamp = 3;
}

message SensorBufferProto {
  Metadata metadata = 1;
  repeated SensorSamples samples = 2;
}
